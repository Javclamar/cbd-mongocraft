services:
  mongo:
    image: mongo:7
    container_name: mongocraft_db
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
      MONGO_INITDB_DATABASE: mongocraft
    volumes:
      - mongo_data:/data/db
    networks:
      - mongocraft_net

  mongo-express:
    image: mongo-express:latest
    container_name: mongocraft_dbui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: adminpassword
      ME_CONFIG_MONGODB_URL: mongodb://admin:adminpassword@mongo:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongo
    networks:
      - mongocraft_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mongocraft_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env.docker
    depends_on:
      - mongo
    networks:
      - mongocraft_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mongocraft_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env.docker
    depends_on:
      - backend
    networks:
      - mongocraft_net

volumes:
  mongo_data:

networks:
  mongocraft_net:
    driver: bridge
